<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-mesh</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #1a1b23;
        --bg-surface: #22232e;
        --bg-hover: #2a2b38;
        --border: #333445;
        --text: #e0e0e8;
        --text-dim: #888899;
        --text-muted: #555566;
        --accent: #7c6ff7;
        --accent-dim: #5a50b4;
      }

      body {
        font-family:
          "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-surface);
        flex-shrink: 0;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.5px;
      }

      .connection-status {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
        flex-shrink: 0;
      }
      .connection-status.connected {
        background: #4ade80;
      }
      .connection-status.disconnected {
        background: #f87171;
      }

      .agents-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: auto;
        flex-wrap: wrap;
      }

      .agents-bar .label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .agent-badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 12px;
        border: 1px solid;
        font-weight: 500;
      }

      /* ── Messages ── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .msg {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
        max-width: 100%;
        animation: fadeIn 0.15s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg:hover {
        background: var(--bg-hover);
      }

      .msg .meta {
        display: inline;
      }

      .msg .sender {
        font-weight: 600;
        margin-right: 4px;
      }

      .msg .arrow {
        color: var(--text-muted);
        margin-right: 4px;
        font-size: 11px;
      }

      .msg .recipient {
        font-weight: 500;
        margin-right: 8px;
        font-size: 12px;
      }

      .msg .time {
        color: var(--text-muted);
        font-size: 11px;
        margin-right: 8px;
      }

      .msg .broadcast-badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 8px;
        background: rgba(124, 111, 247, 0.15);
        color: var(--accent);
        border: 1px solid rgba(124, 111, 247, 0.3);
        margin-right: 8px;
        vertical-align: middle;
      }

      .msg .content {
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg .content code {
        background: rgba(124, 111, 247, 0.12);
        border: 1px solid rgba(124, 111, 247, 0.25);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 0.92em;
      }

      .msg .content .code-block-wrapper {
        margin: 6px 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }

      .msg .content .code-block-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #1e1f2a;
        padding: 4px 10px;
        cursor: pointer;
        user-select: none;
        font-size: 0.8em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
      }

      .msg .content .code-block-header:hover {
        background: var(--bg-hover);
      }

      .msg .content .code-block-header .toggle-icon {
        transition: transform 0.2s;
      }

      .msg .content .code-block-wrapper.collapsed .toggle-icon {
        transform: rotate(-90deg);
      }

      .msg .content .code-block-wrapper.collapsed pre {
        display: none;
      }

      .msg .content pre {
        background: #191a22;
        padding: 12px 14px;
        margin: 0;
        overflow-x: auto;
        white-space: pre;
        line-height: 1.45;
      }

      .msg .content pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.9em;
      }

      .msg .content pre .code-lang {
        display: block;
        color: var(--text-muted);
        font-size: 0.8em;
        margin-bottom: 6px;
        user-select: none;
      }

      .msg.system {
        color: var(--text-muted);
        font-style: italic;
        font-size: 12px;
        padding: 4px 12px;
      }

      .msg.system .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }

      .msg.system .dot.connected {
        background: #4ade80;
      }
      .msg.system .dot.disconnected {
        background: #f87171;
      }

      /* ── Input ── */
      .input-area {
        display: flex;
        gap: 8px;
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        background: var(--bg-surface);
        flex-shrink: 0;
        align-items: flex-end;
      }

      .input-area label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex-shrink: 0;
        padding-bottom: 8px;
      }

      #recipient {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        width: 120px;
        flex-shrink: 0;
      }

      #recipient:focus {
        outline: none;
        border-color: var(--accent);
      }

      #input {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 13px;
        font-family: inherit;
        resize: none;
        overflow-y: auto;
        max-height: 270px;
        min-height: 36px;
        line-height: 1.4;
      }

      #input:focus {
        outline: none;
        border-color: var(--accent);
      }

      #send-btn {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 13px;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        flex-shrink: 0;
      }

      #send-btn:hover {
        background: var(--accent-dim);
      }
      #send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Deliberation ── */
      .deliberation-group {
        border: 1px solid var(--border);
        border-radius: 8px;
        margin: 4px 0;
      }

      .deliberation-group.collapsed .deliberation-messages {
        max-height: 60px;
        overflow: hidden;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 20%,
          rgba(0, 0, 0, 0) 100%
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1) 20%,
          rgba(0, 0, 0, 0) 100%
        );
      }

      .deliberation-group.expanded .deliberation-messages {
        max-height: 300px;
        overflow-y: auto;
      }

      .deliberation-messages {
        padding: 4px 0;
      }

      .deliberation-messages::-webkit-scrollbar {
        width: 4px;
      }
      .deliberation-messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .deliberation-messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .deliberation-messages .msg {
        opacity: 0.6;
        font-size: 12px;
      }

      .deliberation-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        border-top: 1px solid var(--border);
        background: var(--bg-surface);
      }

      .deliberation-toggle:hover {
        color: var(--text-dim);
        background: var(--bg-hover);
      }

      .deliberation-toggle .chevron {
        transition: transform 0.2s;
        font-size: 10px;
      }

      .deliberation-group.expanded .deliberation-toggle .chevron {
        transform: rotate(180deg);
      }

      /* ── Images ── */
      .msg .image-content {
        display: block;
        max-width: 400px;
        max-height: 300px;
        border-radius: 6px;
        margin-top: 4px;
        cursor: pointer;
      }

      .msg .image-content:hover {
        opacity: 0.9;
      }

      #image-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        cursor: pointer;
        color: var(--text-dim);
        font-size: 16px;
        flex-shrink: 0;
        line-height: 1;
      }

      #image-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .drop-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(124, 111, 247, 0.1);
        border: 2px dashed var(--accent);
        z-index: 100;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--accent);
        pointer-events: none;
      }

      .drop-overlay.active {
        display: flex;
      }

      .image-preview {
        display: none;
        padding: 8px 20px;
        border-top: 1px solid var(--border);
        background: var(--bg-surface);
        align-items: center;
        gap: 8px;
      }

      .image-preview.active {
        display: flex;
      }

      .image-preview img {
        max-height: 60px;
        border-radius: 4px;
      }

      .image-preview .remove-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        padding: 4px;
      }

      .image-preview .remove-btn:hover {
        color: #f87171;
      }

      /* ── Empty state ── */
      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: var(--text-muted);
        font-size: 14px;
      }

      /* ── Scrollbar ── */
      #messages::-webkit-scrollbar {
        width: 6px;
      }
      #messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      #messages::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* ── Workflow Sidebar ── */
      .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .workflow-sidebar {
        width: 220px;
        border-right: 1px solid var(--border);
        background: var(--bg-surface);
        overflow-y: auto;
        padding: 12px;
        display: none;
        flex-shrink: 0;
      }

      .workflow-sidebar.active {
        display: block;
      }

      .workflow-sidebar h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 12px;
      }

      .workflow-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
        word-break: break-word;
      }

      .workflow-status-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 8px;
        display: inline-block;
        margin-bottom: 12px;
      }

      .workflow-status-badge.running { background: #7c6ff722; color: #7c6ff7; }
      .workflow-status-badge.completed { background: #4ade8022; color: #4ade80; }
      .workflow-status-badge.cancelled { background: #f8717122; color: #f87171; }
      .workflow-status-badge.failed { background: #f8717122; color: #f87171; }
      .workflow-status-badge.paused { background: #d19a6622; color: #d19a66; }

      .wf-task {
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
      }

      .wf-task:last-child {
        border-bottom: none;
      }

      .wf-task-header {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .wf-task-icon {
        flex-shrink: 0;
        width: 14px;
        text-align: center;
      }

      .wf-task-id {
        color: var(--text);
        font-weight: 500;
      }

      .wf-task-detail {
        font-size: 11px;
        color: var(--text-dim);
        margin-left: 20px;
        margin-top: 2px;
      }

      .wf-progress {
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--text-dim);
      }

      .wf-progress-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 4px;
        overflow: hidden;
      }

      .wf-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="connection-status" id="conn-status"></div>
      <h1>agent-mesh</h1>
      <div class="agents-bar">
        <span class="label">Online:</span>
        <div id="agents-list"></div>
      </div>
    </header>

    <div class="drop-overlay" id="drop-overlay">Drop image here</div>

    <div class="main-content">
      <div class="workflow-sidebar" id="workflow-sidebar">
        <h2>Workflow</h2>
        <div id="wf-content">No active workflow</div>
      </div>
      <div class="chat-area">
        <div id="messages">
          <div class="empty-state" id="empty">Connecting to broker...</div>
        </div>

        <div class="image-preview" id="image-preview">
          <img id="preview-img" src="" alt="preview" />
          <span
            id="preview-name"
            style="font-size: 12px; color: var(--text-dim)"
          ></span>
          <button class="remove-btn" id="remove-preview">&times;</button>
        </div>

        <div class="input-area">
          <label for="recipient">To:</label>
          <select id="recipient">
            <option value="*">everyone</option>
          </select>
          <textarea
            id="input"
            rows="1"
            placeholder="Type a message..."
            autocomplete="off"
          ></textarea>
          <button id="image-btn" title="Attach image">&#128247;</button>
          <input type="file" id="file-input" accept="image/*" hidden />
          <button id="send-btn" disabled>Send</button>
        </div>
      </div>
    </div>

    <script>
      // ── Agent colors ──
      const AGENT_COLORS = [
        "#7c6ff7",
        "#e06c75",
        "#61afef",
        "#98c379",
        "#d19a66",
        "#c678dd",
        "#56b6c2",
        "#e5c07b",
      ];
      const colorMap = {};
      let colorIndex = 0;

      function getAgentColor(name) {
        if (!colorMap[name]) {
          colorMap[name] = AGENT_COLORS[colorIndex % AGENT_COLORS.length];
          colorIndex++;
        }
        return colorMap[name];
      }

      // ── DOM refs ──
      const messagesEl = document.getElementById("messages");
      const emptyEl = document.getElementById("empty");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send-btn");
      const recipientEl = document.getElementById("recipient");
      const agentsListEl = document.getElementById("agents-list");
      const connStatus = document.getElementById("conn-status");

      let ws;
      let agents = [];
      let hasMessages = false;
      let currentDeliberation = null; // { groupEl, messagesEl, count }
      let workflowData = null; // current WorkflowStatusData

      // ── WebSocket connection ──
      function connect() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${location.host}`);

        ws.onopen = () => {
          connStatus.className = "connection-status connected";
          sendBtn.disabled = false;
          ws.send(JSON.stringify({ type: "register_viewer" }));
          // Request history
          ws.send(
            JSON.stringify({
              type: "read_history",
              requestId: "init-" + Date.now(),
              limit: 100,
            }),
          );
        };

        ws.onclose = () => {
          connStatus.className = "connection-status disconnected";
          sendBtn.disabled = true;
          setTimeout(connect, 2000);
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          switch (msg.type) {
            case "deliver":
              addMessage(msg);
              break;
            case "system_event":
              handleSystemEvent(msg);
              break;
            case "read_history_response":
              if (msg.messages.length > 0) {
                for (const m of msg.messages) {
                  addMessage(m, true);
                }
                scrollToBottom();
              }
              break;
            case "workflow:status_response":
              if (msg.data) {
                renderWorkflow(msg.data);
              }
              break;
          }
        };
      }

      // ── Deliberation helpers ──
      function isDeliberation(content) {
        return content.trimStart().startsWith("[deliberation]");
      }

      function isFinalAnswer(content) {
        return content.trimStart().startsWith("[final]");
      }

      function stripPrefix(content, prefix) {
        return content.trimStart().slice(prefix.length).trimStart();
      }

      function ensureDeliberationGroup() {
        if (currentDeliberation) return currentDeliberation;

        const groupEl = document.createElement("div");
        groupEl.className = "deliberation-group collapsed";

        const msgsEl = document.createElement("div");
        msgsEl.className = "deliberation-messages";

        const toggleEl = document.createElement("div");
        toggleEl.className = "deliberation-toggle";
        toggleEl.innerHTML =
          '<span class="chevron">&#9660;</span> <span class="toggle-text">Agent deliberation (0 messages)</span>';
        toggleEl.addEventListener("click", () => {
          const isCollapsed = groupEl.classList.contains("collapsed");
          groupEl.classList.toggle("collapsed", !isCollapsed);
          groupEl.classList.toggle("expanded", isCollapsed);
        });

        groupEl.appendChild(msgsEl);
        groupEl.appendChild(toggleEl);
        messagesEl.appendChild(groupEl);

        currentDeliberation = {
          groupEl,
          messagesEl: msgsEl,
          toggleEl,
          count: 0,
        };
        return currentDeliberation;
      }

      function closeDeliberation() {
        currentDeliberation = null;
      }

      // ── Render a chat message ──
      function addMessage(msg, isHistory = false) {
        if (!hasMessages) {
          emptyEl.remove();
          hasMessages = true;
        }

        const content = msg.content || "";
        const isDelib = isDeliberation(content);
        const isFinal = isFinalAnswer(content);
        const displayContent = isDelib
          ? stripPrefix(content, "[deliberation]")
          : isFinal
            ? stripPrefix(content, "[final]")
            : content;

        const el = document.createElement("div");
        el.className = "msg";

        const time = new Date(msg.timestamp).toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        const senderColor = getAgentColor(msg.from);
        const isBroadcast = msg.to === "*";

        let recipientHtml = "";
        if (isBroadcast) {
          recipientHtml = `<span class="broadcast-badge">broadcast</span>`;
        } else {
          const recipientColor = getAgentColor(msg.to);
          recipientHtml = `<span class="arrow">&rarr;</span><span class="recipient" style="color: ${recipientColor}">${esc(msg.to)}</span>`;
        }

        el.innerHTML =
          `<span class="time">${time}</span>` +
          `<span class="sender" style="color: ${senderColor}">${esc(msg.from)}</span>` +
          recipientHtml +
          renderContent(displayContent);

        if (isDelib) {
          const group = ensureDeliberationGroup();
          group.messagesEl.appendChild(el);
          group.count++;
          group.toggleEl.querySelector(".toggle-text").textContent =
            `Agent deliberation (${group.count} message${group.count === 1 ? "" : "s"})`;
        } else {
          if (isFinal) {
            closeDeliberation();
          }
          messagesEl.appendChild(el);
          if (!isDelib && !isFinal && currentDeliberation) {
            // Non-deliberation message breaks the group
            closeDeliberation();
          }
        }

        if (!isHistory) {
          scrollToBottom();
        }
      }

      // ── System events (agent join/leave) ──
      function handleSystemEvent(msg) {
        agents = msg.agents;
        renderAgents();

        if (msg.agentName) {
          const el = document.createElement("div");
          const isConnect = msg.event === "agent_connected";
          const color = getAgentColor(msg.agentName);
          el.className = "msg system";
          el.innerHTML =
            `<span class="dot ${isConnect ? "connected" : "disconnected"}"></span>` +
            `<span style="color: ${color}; font-style: normal; font-weight: 500;">${esc(msg.agentName)}</span> ` +
            (isConnect ? "joined the mesh" : "left the mesh");

          if (!hasMessages) {
            emptyEl.remove();
            hasMessages = true;
          }
          messagesEl.appendChild(el);
          scrollToBottom();
        }
      }

      // ── Render agent badges ──
      function renderAgents() {
        agentsListEl.innerHTML = "";

        // Update recipient dropdown
        const currentValue = recipientEl.value;
        recipientEl.innerHTML = '<option value="*">everyone</option>';

        if (agents.length === 0) {
          agentsListEl.innerHTML =
            '<span style="color: var(--text-muted); font-size: 12px;">none</span>';
          return;
        }

        for (const agent of agents) {
          const color = getAgentColor(agent.name);
          const badge = document.createElement("span");
          badge.className = "agent-badge";
          badge.textContent = agent.name;
          badge.style.color = color;
          badge.style.borderColor = color + "55";
          badge.style.background = color + "15";
          if (agent.description) {
            badge.title = agent.description;
          }
          agentsListEl.appendChild(badge);

          const opt = document.createElement("option");
          opt.value = agent.name;
          opt.textContent = agent.name;
          recipientEl.appendChild(opt);
        }

        recipientEl.value = currentValue;
        // If previous selection is gone, default to broadcast
        if (recipientEl.value !== currentValue) {
          recipientEl.value = "*";
        }
      }

      // ── Send message ──
      function sendMessage() {
        const content = inputEl.value.trim();
        if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

        const msg = {
          type: "send",
          id: crypto.randomUUID(),
          from: "human",
          to: recipientEl.value,
          content,
          timestamp: new Date().toISOString(),
        };

        ws.send(JSON.stringify(msg));
        inputEl.value = "";
        inputEl.style.height = "auto";
        inputEl.focus();
      }

      sendBtn.addEventListener("click", sendMessage);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea as content grows
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 270) + "px";
      });

      // ── Helpers ──
      function scrollToBottom() {
        requestAnimationFrame(() => {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        });
      }

      function esc(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function renderMarkdown(text) {
        // Process fenced code blocks first: ```lang\n...\n```
        const parts = [];
        const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
        let lastIdx = 0;
        let m;

        while ((m = codeBlockRegex.exec(text)) !== null) {
          if (m.index > lastIdx) {
            parts.push({ type: "text", value: text.slice(lastIdx, m.index) });
          }
          parts.push({ type: "codeblock", lang: m[1], value: m[2] });
          lastIdx = m.index + m[0].length;
        }
        if (lastIdx < text.length) {
          parts.push({ type: "text", value: text.slice(lastIdx) });
        }

        return parts
          .map((p) => {
            if (p.type === "codeblock") {
              const langLabel = p.lang
                ? `<span class="code-lang">${esc(p.lang)}</span>`
                : "";
              const lines = p.value.split("\n").length;
              const collapsed = lines > 10 ? " collapsed" : "";
              const label = p.lang || "code";
              return `<div class="code-block-wrapper${collapsed}"><div class="code-block-header" onclick="this.parentElement.classList.toggle('collapsed')"><span>${esc(label)} · ${lines} lines</span><span class="toggle-icon">▼</span></div><pre><code>${langLabel}${esc(p.value)}</code></pre></div>`;
            }
            // For text parts, handle inline code: `...`
            return esc(p.value).replace(
              /`([^`]+)`/g,
              "<code>$1</code>"
            );
          })
          .join("");
      }

      function renderContent(content) {
        // Split content into text and image parts
        const imageRegex = /\[image:(\/uploads\/[^\]]+)\]/g;
        let result = "";
        let lastIndex = 0;
        let match;

        while ((match = imageRegex.exec(content)) !== null) {
          // Add text before the image
          if (match.index > lastIndex) {
            const textBefore = content.slice(lastIndex, match.index);
            result += `<span class="content">${renderMarkdown(textBefore)}</span>`;
          }
          // Add the image
          const url = match[1];
          result += `<img class="image-content" src="${esc(url)}" alt="shared image" onclick="window.open('${esc(url)}', '_blank')" />`;
          lastIndex = match.index + match[0].length;
        }

        // Add remaining text
        if (lastIndex < content.length) {
          const remaining = content.slice(lastIndex);
          result += `<span class="content">${renderMarkdown(remaining)}</span>`;
        }

        // If no images found, just return markdown-rendered text
        if (lastIndex === 0) {
          return `<span class="content">${renderMarkdown(content)}</span>`;
        }

        return result;
      }

      // ── Image handling ──
      const imageBtn = document.getElementById("image-btn");
      const fileInput = document.getElementById("file-input");
      const dropOverlay = document.getElementById("drop-overlay");
      const imagePreview = document.getElementById("image-preview");
      const previewImg = document.getElementById("preview-img");
      const previewName = document.getElementById("preview-name");
      const removePreview = document.getElementById("remove-preview");

      let pendingImage = null; // { file, dataUrl }

      imageBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length > 0) stageImage(e.target.files[0]);
        fileInput.value = "";
      });

      removePreview.addEventListener("click", clearImage);

      function stageImage(file) {
        if (!file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = () => {
          pendingImage = { file, dataUrl: reader.result };
          previewImg.src = reader.result;
          previewName.textContent = file.name;
          imagePreview.classList.add("active");
        };
        reader.readAsDataURL(file);
      }

      function clearImage() {
        pendingImage = null;
        imagePreview.classList.remove("active");
        previewImg.src = "";
        previewName.textContent = "";
      }

      async function uploadAndSendImage() {
        if (!pendingImage) return;
        const res = await fetch("/uploads", {
          method: "POST",
          headers: { "Content-Type": pendingImage.file.type },
          body: pendingImage.file,
        });
        const data = await res.json();
        const text = inputEl.value.trim();
        const content = text
          ? `${text}\n[image:${data.url}]`
          : `[image:${data.url}]`;
        const msg = {
          type: "send",
          id: crypto.randomUUID(),
          from: "human",
          to: recipientEl.value,
          content,
          timestamp: new Date().toISOString(),
        };
        ws.send(JSON.stringify(msg));
        inputEl.value = "";
        inputEl.style.height = "auto";
        clearImage();
        inputEl.focus();
      }

      // Override sendMessage to handle pending images
      const _originalSend = sendMessage;
      sendMessage = function () {
        if (pendingImage) {
          uploadAndSendImage();
          return;
        }
        _originalSend();
      };

      // Drag and drop
      let dragCounter = 0;
      document.addEventListener("dragenter", (e) => {
        e.preventDefault();
        dragCounter++;
        if (e.dataTransfer.types.includes("Files")) {
          dropOverlay.classList.add("active");
        }
      });
      document.addEventListener("dragleave", (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          dropOverlay.classList.remove("active");
        }
      });
      document.addEventListener("dragover", (e) => e.preventDefault());
      document.addEventListener("drop", (e) => {
        e.preventDefault();
        dragCounter = 0;
        dropOverlay.classList.remove("active");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) stageImage(file);
      });

      // Paste image from clipboard
      document.addEventListener("paste", (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith("image/")) {
            e.preventDefault();
            stageImage(item.getAsFile());
            return;
          }
        }
      });

      // ── Workflow sidebar ──
      const workflowSidebar = document.getElementById("workflow-sidebar");
      const wfContent = document.getElementById("wf-content");

      function renderWorkflow(data) {
        workflowData = data;
        workflowSidebar.classList.add("active");

        const statusIcons = {
          pending: "○",
          producing: "●",
          reviewing: "◐",
          done: "✓",
          stalled: "⚠",
        };

        const done = data.tasks.filter((t) => t.status === "done").length;
        const total = data.tasks.length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;

        let html =
          `<div class="workflow-name">${esc(data.name)}</div>` +
          `<span class="workflow-status-badge ${data.status}">${data.status}</span>`;

        for (const task of data.tasks) {
          const icon = statusIcons[task.status] || "?";
          const isStuck = task.iteration >= 5;
          const iconClass = isStuck ? "stalled" : task.status;
          let detail = task.status;
          if (task.assignee) detail += ` → ${esc(task.assignee)}`;
          if (task.iteration > 1) detail += ` · iter ${task.iteration}`;

          html +=
            `<div class="wf-task">` +
            `<div class="wf-task-header">` +
            `<span class="wf-task-icon">${icon}</span>` +
            `<span class="wf-task-id">${esc(task.id)}</span>` +
            `</div>` +
            `<div class="wf-task-detail">${detail}</div>` +
            `</div>`;
        }

        html +=
          `<div class="wf-progress">` +
          `Progress: ${done}/${total}` +
          `<div class="wf-progress-bar"><div class="wf-progress-fill" style="width:${pct}%"></div></div>` +
          `</div>`;

        if (data.status === "completed" || data.status === "cancelled" || data.status === "failed") {
          // Keep showing but could add a dismiss button later
        }

        wfContent.innerHTML = html;
      }

      // ── Go ──
      connect();
    </script>
  </body>
</html>
